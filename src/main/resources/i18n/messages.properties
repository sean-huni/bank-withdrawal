# Error messages — keys are bound to wire codes in ErrorCode (exception package).
error.account.not-found=Account {0} not found
error.transaction.not-found=Transaction {0} not found
error.funds.insufficient=Insufficient funds for withdrawal
error.idempotency.unresolved=Idempotency-Key {0} could not be resolved
error.idempotency.replay-mismatch=Idempotency-Key {0} was already used with a different request
error.idempotency.in-progress=A request with Idempotency-Key {0} is already in progress
error.validation.failed=Request validation failed
error.header.missing=Required header ''{0}'' is missing
error.parameter.invalid=Parameter ''{0}'' has an invalid value
error.api-version.unsupported=API version ''{0}'' is not supported
error.api-version.missing=An API version is required
error.body.malformed=Malformed request body
error.concurrency.conflict=The resource was modified concurrently; retry
error.data.integrity=The request conflicts with existing data
error.resource.not-found=No resource at the requested path
# Security — auth/authz failures (user-enumeration-safe: never reveal whether identity/credential exists)
error.auth.unauthorized=Authentication is required to access this resource
error.auth.forbidden=You do not have permission to access this resource
error.internal=An unexpected error occurred
# Constraint messages — referenced as braced keys from annotations; {integer},
# {fraction}, {list} are Hibernate Validator message parameters.
error.amount.required=Amount is required
error.amount.positive=Amount must be greater than zero
error.amount.digits=Amount must have at most {integer} integer digits and {fraction} fraction digits
error.sort.unsupported=must be one of: {list}
error.card.not-found=Card not recognised
error.card.invalid=Card number must be 16 digits
error.pin.invalid=Incorrect PIN
error.pin.invalid-format=PIN must be 4 digits
# Config validation — @ConfigurationProperties (app.aws), braced keys (point 18).
config.aws.region.required=AWS region is required
config.aws.access-key.required=AWS access key is required
config.aws.secret-key.required=AWS secret key is required
config.aws.sns.required=AWS SNS configuration is required
config.aws.sns.topic-arn.required=AWS SNS withdrawal topic ARN is required
# Config validation — @ConfigurationProperties (atm.passkey), braced keys (point 18).
config.passkey.rp-id.required=Passkey relying-party id (rpId) is required
config.passkey.rp-name.required=Passkey relying-party name is required
config.passkey.origins.required=At least one allowed passkey origin is required
