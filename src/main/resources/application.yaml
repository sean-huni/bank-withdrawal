spring:
  application:
    name: bank-withdrawal
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  aws:
    # Defaults target the LocalStack container from compose.yaml.
    region: us-east-1
    endpoint: http://localhost:4566
    access-key: test
    secret-key: test
    sns:
      withdrawal-topic-arn: arn:aws:sns:us-east-1:000000000000:bank-withdrawal-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.example.bank: DEBUG
