server:
  port: ${SERVER_PORT:8080}
  tomcat:
    # Sloppy clients send Swagger-style JSON-array sort values without percent-encoding
    # (?sort=["type"]); Tomcat rejects these RFC 3986 characters in the query target by
    # default. Letting them through hands the value to SortParameterNormalizingFilter,
    # which unwraps the decoration — identical handling for encoded and unencoded URLs.
    relaxed-query-chars:
      - '['
      - ']'
      - '"'

spring:
  application:
    name: bank-withdrawal
  # Auto-load a local (gitignored) .env file as a property source — see .env.example.
  # Precedence: yml default < .env < real environment variable < test registrars.
  config:
    import: 'optional:file:.env[.properties]'
  # API versioning lives in ApiVersioningConfig (Java), not properties: the path predicate
  # that scopes versioning to /api/** (so springdoc's /v3/api-docs isn't parsed as a version)
  # is only expressible programmatically. Keeping yml properties too would register a second,
  # predicate-less resolver and re-break springdoc.
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

app:
  aws:
    # Defaults target the LocalStack container from compose.yaml; every value is
    # overridable via .env / environment without touching tracked files.
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
    access-key: ${AWS_ACCESS_KEY:test}
    secret-key: ${AWS_SECRET_KEY:test}
    sns:
      withdrawal-topic-arn: ${WITHDRAWAL_TOPIC_ARN:arn:aws:sns:us-east-1:000000000000:bank-withdrawal-events}

management:
  # OTLP export is opt-in via the dev profile (application-dev.yml) — disabled here so
  # tests and non-dev runs never dial a collector that isn't there.
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
  logging:
    export:
      otlp:
        enabled: false
  # Security is descoped for this exercise — management endpoints are public.
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.bank: DEBUG
