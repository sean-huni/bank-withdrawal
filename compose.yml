services:
  postgres:
    image: 'postgres:18-alpine3.23'
    # compose natively reads the same .env file the app imports — one override point
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bank}
      POSTGRES_USER: ${POSTGRES_USER:-bank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bank}
    ports:
      - '5432:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-bank} -d $${POSTGRES_DB:-bank}' ]
      interval: 5s
      timeout: 5s
      retries: 10

  # All-in-one observability: Grafana UI (3000) + embedded OTLP collector (4317 gRPC / 4318 HTTP)
  # backed by Prometheus/Mimir (metrics), Tempo (traces) and Loki (logs).
  # 9090 exposes the embedded Prometheus UI directly (also linked from the dev banner).
  grafana-lgtm:
    image: 'grafana/otel-lgtm:0.28.0'
    ports:
      - '3000:3000'
      - '4317:4317'
      - '4318:4318'
      - '9090:9090'

  # Grafana-MCP
  mcp-grafana:
    image: grafana/mcp-grafana:latest
    command: ["-t", "streamable-http"]
    environment:
      GRAFANA_URL: http://grafana-lgtm:3000          # compose service name, NOT localhost
      # Token comes from .env (gitignored) — compose reads it natively. Mint one in
      # Grafana: Administration → Service accounts (role: Editor). Empty default keeps
      # the clean-clone rule: the stack runs; MCP tool calls just 401 until provisioned.
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SA_TOKEN:-}
    ports:
      - "8001:8000"                                   # 8000 host-side may clash; 8001 is safe
    depends_on:
      - grafana-lgtm

  localstack:
    # 4.x is the community line — the 2026.x CalVer images require a LOCALSTACK_AUTH_TOKEN (license)
    image: 'localstack/localstack:4.14'
    environment:
      SERVICES: sns
    ports:
      - '4566:4566'
    volumes:
      - './localstack/init-sns.sh:/etc/localstack/init/ready.d/init-sns.sh:ro'
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health | grep -q sns' ]
      interval: 5s
      timeout: 5s
      retries: 10
